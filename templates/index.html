<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Zero To Hero</title>
    <style>
        /* reset & base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-rendering: optimizeLegibility;
        }

        .container {
            text-align: center;
            padding: 3rem 2rem;
            max-width: 720px;
            backdrop-filter: blur(6px);
            background: rgba(0,0,0,0.35);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: hue 6s infinite linear;
        }

        @keyframes hue {
            from { filter: hue-rotate(0deg); }
            to   { filter: hue-rotate(360deg); }
        }

        .badge {
            display: inline-block;
            margin: 1rem 0 2rem;
            padding: 0.5rem 1.4rem;
            border: 1px solid #7b2ff7;
            border-radius: 999px;
            font-size: 0.85rem;
            color: #c4b5fd;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1.2rem;
            margin-top: 1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 1.6rem 2rem;
            transition: transform 0.3s ease, background 0.3s ease;
            cursor: default;
        }
        .card:hover {
            transform: translateY(-4px) scale(1.02);
            background: rgba(255, 255, 255, 0.12);
        }
        .card span {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #9ca3af;
            margin-bottom: 0.5rem;
        }
        .card strong {
            font-size: 1.35rem;
            color: #f9fafb;
        }

        footer {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: #9ca3af;
        }
        a { color: #00d2ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>DevOps Zero To Hero</h1>
        <div class="badge">Josh Batch 10</div>
        <div class="cards">
            <div class="card">
                <span>Framework</span>
                <strong>Flask 3.1</strong>
            </div>
            <div class="card">
                <span>Runtime</span>
                <strong>Python 3.14</strong>
            </div>
            <div class="card">
                <span>Deploy</span>
                <strong>AWS ECS</strong>
            </div>
        </div>
        <footer>
            <p>Made with ♥ by <a href="https://github.com/ZainAli35" target="_blank" rel="noopener">ZainAli35</a></p>
        </footer>
    </div>
</body>
</html>
