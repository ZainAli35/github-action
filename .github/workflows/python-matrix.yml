name: Python lint
on:
  push:
    branches: [main]
  
jobs:
    validate:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: [3.9, 3.10, 3.11, 3.12, 3.13]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python 3.13
              uses: actions/setup-python@v5
              with:
                python-version: 3.13

            - name: Install dependencies
              run: |
                python -m pip install -r requirements.txt

            - name: Run linter
              run: |
                flake8 app.py