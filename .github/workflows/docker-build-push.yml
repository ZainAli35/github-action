name: Docker build and push

on:
  push:
    branches: [main]

jobs:
  build-and-push: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Docker credentials
        run: |
          if [ -z "${{ secrets.DOCKER_USER }}" ] || [ -z "${{ secrets.DOCKER_TOKEN }}" ]; then
            echo "::error::GitHub secrets DOCKER_USER or DOCKER_TOKEN are missing.\nAdd them under repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push docker image
        uses: docker/build-push-action@v6
        with:
            context: .
            push: true
            tags: ${{ vars.DOCKER_USER }}/github-action:latest